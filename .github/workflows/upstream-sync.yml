name: upstream-sync
on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and merge
        id: merge
        continue-on-error: true
        run: |
          git remote add upstream https://github.com/goodtab/bentopdf.git
          git fetch upstream
          BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH"
          if git merge upstream/main --no-edit; then
            echo "merge_status=clean" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=conflicts" >> "$GITHUB_OUTPUT"
            git add -A
            git commit -m "merge: upstream/main with conflicts (resolve manually)"
          fi
          git push origin "$BRANCH"

      - uses: peter-evans/create-pull-request@v6
        with:
          title: "Sync upstream → main (${{ steps.merge.outputs.merge_status }})"
          body: |
            Automated weekly merge of `goodtab/bentopdf:main` into our fork.

            Merge status: **${{ steps.merge.outputs.merge_status }}**

            Review checklist before merging:
            - [ ] Resolve any branding-related conflicts
            - [ ] Confirm CI build is green
            - [ ] Run functional regression on resulting :latest image
          branch: ${{ steps.merge.outputs.branch }}
          base: main
